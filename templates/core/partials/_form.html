<form
  class="form"
  method="{{ form_method|default:'post' }}"
  action="{{ form_action|default:'' }}"
  {% if form_enctype %}enctype="{{ form_enctype }}"{% endif %}
>
  {% csrf_token %}
  {% if form.non_field_errors %}
    <div class="alert warning">
      {% for error in form.non_field_errors %}
        <div>{{ error }}</div>
      {% endfor %}
    </div>
  {% endif %}
  {% for field in form %}
    <div class="field{% if field.errors %} has-error{% endif %}">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}
        <div class="help">{{ field.help_text }}</div>
      {% endif %}
      {% for error in field.errors %}
        <div class="error">{{ error }}</div>
      {% endfor %}
    </div>
  {% endfor %}
  <div class="form-actions">
    <button type="submit" class="{{ submit_class|default:'btn btn-primary' }}">
      {{ submit_label|default:"Guardar" }}
    </button>
  </div>
</form>
